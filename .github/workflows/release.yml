name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: cloud-docs-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            binary: cloud-docs-linux-arm64
          - os: macos-latest
            target: darwin-x64
            binary: cloud-docs-darwin-x64
          - os: macos-latest
            target: darwin-arm64
            binary: cloud-docs-darwin-arm64
          - os: windows-latest
            target: windows-x64
            binary: cloud-docs-windows-x64.exe

    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Binary
        run: |
          mkdir -p release
          bun build ./src/cli.ts --compile --minify --target=bun-${{ matrix.target }} --outfile release/${{ matrix.binary }}

      - name: Compress Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czvf release/${{ matrix.binary }}.tar.gz -C release ${{ matrix.binary }}

      - name: Compress Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell -Command "Compress-Archive -Path release/${{ matrix.binary }} -DestinationPath release/${{ matrix.binary }}.zip"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: release/

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten Artifacts
        run: |
          mkdir dist
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} dist/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
