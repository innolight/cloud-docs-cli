name: Release Binaries

on:
  # Triggers the workflow on push for any tag starting with 'v' (e.g., v0.1.0)
  push:
    tags:
      - 'v*'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Essential permission for 'softprops/action-gh-release' to create releases and upload assets
permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      # The matrix builds 5 different combinations of OS and Architecture in parallel
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: cloud-docs-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            binary: cloud-docs-linux-arm64
          - os: macos-latest
            target: darwin-x64
            binary: cloud-docs-darwin-x64
          - os: macos-latest
            target: darwin-arm64
            binary: cloud-docs-darwin-arm64
          - os: windows-latest
            target: windows-x64
            binary: cloud-docs-windows-x64.exe

    steps:
      - uses: actions/checkout@v4
      
      # Bun is required for the 'bun build --compile' command
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # We use esbuild to create a node-compatible bundle first.
      # This handles the 'react-devtools-core' alias correctly (mapping it to an empty object),
      # which prevents resolution errors in the final standalone binary.
      - name: Build Node Bundle
        run: npm run build:node

      # Uses Bun's native compiler to create a standalone executable from the esbuild bundle.
      # The --target flag ensures we cross-compile for the specific matrix platform.
      - name: Build Binary
        run: |
          mkdir -p release
          bun build ./dist/index.js --compile --minify --target=bun-${{ matrix.target }} --outfile release/${{ matrix.binary }}

      # macOS (Apple Silicon especially) kills unsigned binaries at launch with
      # SIGKILL. `bun build --compile` embeds a malformed code signature, so we
      # strip it and apply a fresh ad-hoc signature.
      - name: Sign Binary (macOS)
        if: matrix.os == 'macos-latest'
        run: ./scripts/sign-bin.sh release/${{ matrix.binary }}

      # Linux and macOS binaries are wrapped in .tar.gz to preserve executable permissions
      - name: Compress Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czvf release/${{ matrix.binary }}.tar.gz -C release ${{ matrix.binary }}

      # Windows executables are wrapped in .zip for better native compatibility
      - name: Compress Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell -Command "Compress-Archive -Path release/${{ matrix.binary }} -DestinationPath release/${{ matrix.binary }}.zip"

      # Uploads the compressed asset so the next job (create-release) can access it
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: release/

  create-release:
    name: Create GitHub Release
    # This job only runs after all 5 build-binaries matrix jobs complete successfully
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Collects all artifacts uploaded by the previous job
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Moves all .tar.gz and .zip files from nested artifact folders into a single flat directory
      - name: Flatten Artifacts
        run: |
          mkdir dist
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} dist/ \;

      # Creates the final GitHub Release and attaches the flattened assets.
      # 'generate_release_notes' automatically extracts commit history since the last tag.
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
